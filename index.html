<!DOCTYPE html>
<!-- saved from url=(0044)https://panedeveloper.github.io/Sensor-test/ -->
<html lang="pt-BR"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste de Movimento</title>
  <style>
    body {
      margin: 0;
      background-color: #121212;
      overflow: hidden;
      font-family: sans-serif;
    }#bola {
  position: absolute;
  width: 50px;
  height: 50px;
  background-color: white;
  border-radius: 50%;
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
  will-change: transform;
  z-index: 5;
}

#mensagemPermissao {
  position: absolute;
  left: 50%;
  top: calc(50% - 70px);
  transform: translateX(-50%);
  color: white;
  font-size: 16px;
  background-color: rgba(0, 0, 0, 0.7);
  padding: 10px 20px;
  border-radius: 10px;
  z-index: 2;
  display: none;
}

#btnConfig {
  position: absolute;
  bottom: 20px;
  right: 20px;
  background: none;
  border: none;
  cursor: pointer;
  z-index: 3;
}

#btnConfig svg {
  width: 32px;
  height: 32px;
  fill: white;
}

#configPanel {
  position: fixed;
  bottom: -100%;
  left: 0;
  right: 0;
  background-color: #1e1e1e;
  color: white;
  padding: 20px;
  transition: bottom 0.3s ease-out;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
  z-index: 4;
}

#configPanel.mostrar {
  bottom: 0;
}

.config-header {
  display: flex;
  justify-content: flex-end;
}

#fecharConfig {
  background: none;
  border: none;
  font-size: 20px;
  color: red;
  cursor: pointer;
  transition: color 0.2s;
}

#fecharConfig:hover {
  color: orangered;
}

.particula {
  position: absolute;
  width: 20px;
  height: 20px;
  background-color: rgba(255, 255, 255, 0.5);
  border-radius: 50%;
  pointer-events: none;
  top: 0;
  left: 0;
}

.controles-config {
  display: flex;
  flex-direction: column;
  gap: 15px;
}
  </style>
<style type="text/css" id="operaUserStyle"></style></head>
<body>
  <div id="bola"></div>
  <div id="mensagemPermissao">Toque na tela para permitir o uso do sensor de movimento</div>
  <button id="btnConfig" aria-label="Abrir configurações" title="Configurações">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5zm7.43-2.57a7.97 7.97 0 0 0 0-1.86l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.23l-2.49 1a7.94 7.94 0 0 0-1.6-.93L14.5 2.5a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 0-.5.5L9.03 5.16c-.6.24-1.14.55-1.6.93l-2.49-1a.5.5 0 0 0-.6.23l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65a7.97 7.97 0 0 0 0 1.86L2.56 14.3a.5.5 0 0 0-.12.64l2 3.46a.5.5 0 0 0 .6.23l2.49-1c.47.38 1 .69 1.6.93L9.5 21.5a.5.5 0 0 0 .5.5h4a.5.5 0 0 0 .5-.5l.47-2.67c.6-.24 1.14-.55 1.6-.93l2.49 1a.5.5 0 0 0 .6-.23l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.65z"></path>
    </svg>
  </button>
  <div id="configPanel">
    <div class="config-header">
      <button id="fecharConfig">✕</button>
    </div>
    <div class="controles-config">
      <label>Cor da página: <input type="color" id="corPagina" value="#121212"></label>
      <label>Cor da bolinha: <input type="color" id="corBola" value="#ffffff"></label>
      <label>Modo Caos: <input type="checkbox" id="chkModoCaos"></label>
      <button id="btnReset" style="padding: 10px; background: #444; color: white; border: none; border-radius: 5px;">Resetar Partículas</button>
    </div>
  </div>  <script>
    const bola = document.getElementById('bola');
    const container = document.body;
    const msgPermissao = document.getElementById('mensagemPermissao');
    const btnConfig = document.getElementById('btnConfig');
    const configPanel = document.getElementById('configPanel');
    const fecharConfig = document.getElementById('fecharConfig');
    const corPagina = document.getElementById('corPagina');
    const corBola = document.getElementById('corBola');
    const chkModoCaos = document.getElementById('chkModoCaos');
    const btnReset = document.getElementById('btnReset');

    let permitido = false;
    
    // Estado da Bola Mestra
    const player = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      vx: 0,
      vy: 0,
      radius: 25,
      ax: 0,
      ay: 0
    };

    let particulas = [];
    const FPS = 60;
    const FRICTION = 0.98;
    const BOUNCE = -0.7;

    class Particula {
      constructor() {
        this.element = document.createElement('div');
        this.element.className = 'particula';
        container.appendChild(this.element);
        this.reset();
      }

      reset() {
        this.radius = 10;
        this.x = Math.random() * (window.innerWidth - 20);
        this.y = Math.random() * (window.innerHeight - 20);
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
      }

      update() {
        if (chkModoCaos.checked) {
          // Aplicar gravidade do sensor
          this.vx += player.ax * 0.5;
          this.vy += player.ay * 0.5;
        }

        this.vx *= FRICTION;
        this.vy *= FRICTION;
        this.x += this.vx;
        this.y += this.vy;

        // Colisão com paredes
        if (this.x + this.radius * 2 > window.innerWidth) {
          this.x = window.innerWidth - this.radius * 2;
          this.vx *= BOUNCE;
        } else if (this.x < 0) {
          this.x = 0;
          this.vx *= BOUNCE;
        }

        if (this.y + this.radius * 2 > window.innerHeight) {
          this.y = window.innerHeight - this.radius * 2;
          this.vy *= BOUNCE;
        } else if (this.y < 0) {
          this.y = 0;
          this.vy *= BOUNCE;
        }

        // Colisão com a bola mestra
        const dx = (this.x + this.radius) - player.x;
        const dy = (this.y + this.radius) - player.y;
        const distancia = Math.sqrt(dx * dx + dy * dy);
        const minDist = this.radius + player.radius;

        if (distancia < minDist) {
          const angle = Math.atan2(dy, dx);
          const forca = (minDist - distancia) * 0.5;
          
          // Empurra a partícula baseado na velocidade da mestra
          this.vx += Math.cos(angle) * forca + player.vx * 0.5;
          this.vy += Math.sin(angle) * forca + player.vy * 0.5;
          
          // Reposiciona para não sobrepor
          this.x = player.x + Math.cos(angle) * minDist - this.radius;
          this.y = player.y + Math.sin(angle) * minDist - this.radius;
        }

        this.element.style.transform = `translate3d(${this.x}px, ${this.y}px, 0)`;
      }
    }

    function criarParticulas(qtd) {
      particulas.forEach(p => p.element.remove());
      particulas = Array.from({ length: qtd }, () => new Particula());
    }

    // Permissões
    window.addEventListener('click', async () => {
      if (!permitido && typeof DeviceOrientationEvent?.requestPermission === 'function') {
        try {
          const resposta = await DeviceOrientationEvent.requestPermission();
          if (resposta === 'granted') {
            window.addEventListener('deviceorientation', moverBola);
            msgPermissao.style.display = 'none';
            permitido = true;
          }
        } catch (e) {
          console.error('Permissão negada:', e);
        }
      }
    });

    function moverBola(event) {
      // Normalizar valores do acelerômetro
      player.ax = event.gamma * 0.05;
      player.ay = event.beta * 0.05;
    }

    function animar() {
      // Física da Bola Mestra
      player.vx += player.ax;
      player.vy += player.ay;
      player.vx *= FRICTION;
      player.vy *= FRICTION;
      player.x += player.vx;
      player.y += player.vy;

      // Limites da Bola Mestra (Bounce)
      if (player.x + player.radius > window.innerWidth) {
        player.x = window.innerWidth - player.radius;
        player.vx *= BOUNCE;
      } else if (player.x - player.radius < 0) {
        player.x = player.radius;
        player.vx *= BOUNCE;
      }

      if (player.y + player.radius > window.innerHeight) {
        player.y = window.innerHeight - player.radius;
        player.vy *= BOUNCE;
      } else if (player.y - player.radius < 0) {
        player.y = player.radius;
        player.vy *= BOUNCE;
      }

      // Atualizar DOM
      bola.style.transform = `translate3d(${player.x - player.radius}px, ${player.y - player.radius}px, 0)`;

      if (chkModoCaos.checked) {
        particulas.forEach(p => p.update());
      }

      requestAnimationFrame(animar);
    }

    // Mostrar mensagem se ainda não foi permitido
    window.addEventListener('load', () => {
      if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
        msgPermissao.style.display = 'block';
      } else {
        window.addEventListener('deviceorientation', moverBola);
      }
      animar();
    });

    btnConfig.addEventListener('click', () => {
      configPanel.classList.add('mostrar');
    });

    fecharConfig.addEventListener('click', () => {
      configPanel.classList.remove('mostrar');
    });

    corPagina.addEventListener('input', () => {
      document.body.style.backgroundColor = corPagina.value;
    });

    corBola.addEventListener('input', () => {
      bola.style.backgroundColor = corBola.value;
    });

    btnReset.addEventListener('click', () => criarParticulas(20));
    chkModoCaos.addEventListener('change', (e) => {
      if (e.target.checked) criarParticulas(20);
      else particulas.forEach(p => p.element.remove());
    });

    window.addEventListener('resize', () => {
      player.x = window.innerWidth / 2;
      player.y = window.innerHeight / 2;
    });
  </script>
